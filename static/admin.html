<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange - Admin Dashboard</title>
    <link rel="icon" href="/static/orange-head.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/styles.css?v=8">
    <style>
        /* Override styles.css fixed viewport rules to allow dashboard scrolling */
        html, body {
            overflow-y: auto !important;
            height: auto !important;
        }
        body {
            display: flex !important;
            align-items: stretch !important;
            justify-content: flex-start !important;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col p-4 font-sans selection:bg-orange-950 selection:text-orange-200">
    <!-- Navbar -->
    <nav class="w-[calc(100%-2rem)] max-w-7xl mx-auto mt-4 rounded-3xl bg-zinc-900/80 backdrop-blur-md border border-zinc-800 px-8 py-4 z-10 relative flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-3">
            <img src="/static/orange.svg" class="w-10 h-10 rounded-lg object-contain" alt="Orange Mascot">
            <h1 class="text-2xl font-bold bg-gradient-to-br from-orange-400 to-orange-600 text-transparent bg-clip-text mr-6">Orange Admin</h1>
            
            <!-- Menu Tabs -->
            <div id="admin-menu" class="hidden items-center gap-2 border-l border-zinc-800 pl-6">
                <button class="flex items-center gap-2 bg-zinc-800 text-orange-400 px-4 py-2 rounded-lg text-sm font-medium shadow-sm hover:bg-zinc-700 transition">
                    <i data-lucide="bar-chart-2" class="w-4 h-4"></i> Analytics
                </button>
            </div>
        </div>
        <button id="logout-btn" class="hidden bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-5 py-2.5 rounded-xl text-sm font-medium transition-colors border border-zinc-700 ml-auto flex items-center gap-2"><i data-lucide="log-out" class="w-4 h-4"></i> Logout</button>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col items-center relative w-full pt-16 pb-10 px-4 z-10">
        
        <!-- Login Form UI -->
        <div id="login-container" class="max-w-md w-full bg-zinc-900 border border-zinc-800 rounded-3xl p-10 shadow-2xl animate-in fade-in zoom-in duration-300 mt-10">
            <div class="flex flex-col items-center gap-3 mb-8">
                <i data-lucide="lock" class="w-12 h-12 text-orange-500 mb-2"></i>
                <h2 class="text-2xl font-semibold text-zinc-100">Admin Tracking</h2>
                <p class="text-zinc-500 text-sm">Secure dashboard access</p>
            </div>
            
            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-xs font-medium text-zinc-500 uppercase tracking-widest pl-1">Admin Key</label>
                    <input type="password" id="admin-key" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-lg focus:outline-none focus:ring-1 focus:ring-orange-600 focus:border-orange-600 transition-all placeholder:text-zinc-700" placeholder="••••••••" autocomplete="off">
                </div>
                
                <div id="login-error" class="hidden bg-red-950/50 border border-red-900 text-red-200 px-4 py-3 rounded-xl text-sm flex items-start gap-3">
                    <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i>
                    <span>Invalid Admin Key</span>
                </div>

                <button id="login-btn" class="w-full bg-gradient-to-r from-orange-600 to-orange-500 text-white font-semibold flex items-center justify-center gap-3 rounded-xl py-4 hover:from-orange-500 hover:to-orange-400 transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-[0_0_20px_rgba(249,115,22,0.2)] text-lg mt-4">
                    Secure Login <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Dashboard UI -->
        <div id="dashboard-container" class="hidden w-full max-w-7xl mx-auto space-y-8 animate-in fade-in duration-300 pb-8">
            <!-- Header & Filters -->
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <h2 class="text-2xl font-semibold text-zinc-100 flex items-center gap-2">
                    <i data-lucide="bar-chart" class="w-6 h-6 text-orange-500"></i> Analytics
                </h2>
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-1 flex gap-1 shadow-lg">
                    <button class="period-btn px-3 py-1.5 rounded-md text-xs font-medium bg-zinc-800 text-zinc-100 shadow-sm transition-colors" data-period="all">All Time</button>
                    <button class="period-btn px-3 py-1.5 rounded-md text-xs font-medium text-zinc-400 hover:text-zinc-200 transition-colors" data-period="weekly">Weekly</button>
                    <button class="period-btn px-3 py-1.5 rounded-md text-xs font-medium text-zinc-400 hover:text-zinc-200 transition-colors" data-period="monthly">Monthly</button>
                    <button class="period-btn px-3 py-1.5 rounded-md text-xs font-medium text-zinc-400 hover:text-zinc-200 transition-colors" data-period="quarterly">Quarterly</button>
                    <button class="period-btn px-3 py-1.5 rounded-md text-xs font-medium text-zinc-400 hover:text-zinc-200 transition-colors" data-period="yearly">Yearly</button>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-zinc-900/90 backdrop-blur-xl border border-zinc-800 rounded-3xl p-6 shadow-xl">
                    <h3 class="text-xs font-medium text-zinc-500 uppercase tracking-widest mb-4">Top Tools Used</h3>
                    <ul class="space-y-3 overflow-y-auto max-h-72 pr-2" id="tools-list"></ul>
                </div>
                <div class="bg-zinc-900/90 backdrop-blur-xl border border-zinc-800 rounded-3xl p-6 shadow-xl flex flex-col items-center justify-center text-center">
                    <h3 class="text-xs font-medium text-zinc-500 uppercase tracking-widest mb-2">Total Generations</h3>
                    <div class="text-6xl font-bold bg-gradient-to-br from-orange-400 to-orange-600 text-transparent bg-clip-text" id="total-count">0</div>
                </div>
                <div class="bg-zinc-900/90 backdrop-blur-xl border border-zinc-800 rounded-3xl p-6 shadow-xl">
                    <h3 class="text-xs font-medium text-zinc-500 uppercase tracking-widest mb-4">Top Users (IP)</h3>
                    <ul class="space-y-3 overflow-y-auto max-h-72 pr-2" id="ip-list"></ul>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-zinc-900/90 backdrop-blur-xl border border-zinc-800 rounded-3xl shadow-xl flex flex-col">
                <div class="p-6 border-b border-zinc-800">
                    <h2 class="text-lg font-semibold text-zinc-100 flex items-center gap-2">
                        <i data-lucide="activity" class="w-5 h-5 text-orange-500"></i> Activity
                    </h2>
                </div>
                <div class="overflow-y-auto flex-1 p-0">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="uppercase tracking-wider text-zinc-500 text-xs bg-zinc-950/50 sticky top-0 backdrop-blur-sm">
                            <tr>
                                <th class="px-6 py-4 font-medium">ID</th>
                                <th class="px-6 py-4 font-medium">Time (Local)</th>
                                <th class="px-6 py-4 font-medium">IP Address</th>
                                <th class="px-6 py-4 font-medium">Tool ID</th>
                                <th class="px-6 py-4 font-medium w-full">Prompt Snippet</th>
                            </tr>
                        </thead>
                        <tbody id="logs-body" class="divide-y divide-zinc-800/50">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Futuristic Mesh Background -->
    <div class="mesh-container">
        <div class="mesh-blob mesh-1"></div>
        <div class="mesh-blob mesh-2"></div>
        <div class="mesh-blob mesh-3"></div>
        <div class="mesh-overlay"></div>
    </div>

    <!-- Script -->
    <script>
        lucide.createIcons();

        const loginContainer = document.getElementById('login-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const adminMenu = document.getElementById('admin-menu');
        const adminKeyInput = document.getElementById('admin-key');
        const loginError = document.getElementById('login-error');

        let currentKey = localStorage.getItem('orange_admin_key');
        let currentPeriod = 'all';

        // Period filter events
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.period-btn').forEach(b => {
                    b.className = "period-btn px-3 py-1.5 rounded-md text-xs font-medium text-zinc-400 hover:text-zinc-200 transition-colors";
                });
                e.target.className = "period-btn px-3 py-1.5 rounded-md text-xs font-medium bg-zinc-800 text-zinc-100 shadow-sm transition-colors";
                currentPeriod = e.target.getAttribute('data-period');
                if (currentKey) {
                    fetchData(currentKey);
                }
            });
        });

        if (currentKey) {
            fetchData(currentKey);
        }

        loginBtn.addEventListener('click', () => {
            const key = adminKeyInput.value.trim();
            if(!key) return;
            fetchData(key);
        });

        adminKeyInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('orange_admin_key');
            currentKey = null;
            dashboardContainer.classList.add('hidden');
            logoutBtn.classList.add('hidden');
            adminMenu.classList.add('hidden');
            adminMenu.classList.remove('flex');
            loginContainer.classList.remove('hidden');
            adminKeyInput.value = '';
        });

        async function fetchData(key) {
            const originalBtnText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Authenticating...';
            lucide.createIcons();
            
            try {
                const res = await fetch('/api/admin/usage?key=' + encodeURIComponent(key) + '&period=' + currentPeriod);
                if (res.status === 401) {
                    throw new Error("Unauthorized");
                }
                const data = await res.json();
                
                // Login Success
                localStorage.setItem('orange_admin_key', key);
                currentKey = key;
                loginError.classList.add('hidden');
                loginContainer.classList.add('hidden');
                dashboardContainer.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                adminMenu.classList.remove('hidden');
                adminMenu.classList.add('flex');
                
                renderDashboard(data);
            } catch (e) {
                loginError.classList.remove('hidden');
                localStorage.removeItem('orange_admin_key');
            } finally {
                loginBtn.innerHTML = originalBtnText;
                lucide.createIcons();
            }
        }

        function renderDashboard(data) {
            const { logs, tools_summary, ip_summary } = data;
            
            // Total Gen
            const total = tools_summary.reduce((acc, curr) => acc + curr.count, 0);
            document.getElementById('total-count').innerText = total;

            // Tools list
            const toolsList = document.getElementById('tools-list');
            toolsList.innerHTML = '';
            tools_summary.sort((a,b) => b.count - a.count).forEach(t => {
                toolsList.innerHTML += `<li class="flex justify-between items-center py-2 border-b border-zinc-800/50 last:border-0"><span class="text-zinc-300 font-medium">${t.tool_id}</span> <strong class="bg-zinc-800/50 text-orange-400 border border-zinc-700/50 px-2 py-1 rounded-md text-xs">${t.count}</strong></li>`;
            });

            // IP list
            const ipList = document.getElementById('ip-list');
            ipList.innerHTML = '';
            ip_summary.sort((a,b) => b.count - a.count).forEach(ip => {
                ipList.innerHTML += `<li class="flex justify-between items-center py-2 border-b border-zinc-800/50 last:border-0"><span class="text-zinc-300 font-mono text-sm">${ip.client_ip}</span> <strong class="bg-zinc-800/50 text-orange-400 border border-zinc-700/50 px-2 py-1 rounded-md text-xs">${ip.count}</strong></li>`;
            });

            // Logs
            const logsBody = document.getElementById('logs-body');
            logsBody.innerHTML = '';
            logs.forEach(log => {
                let localTime = 'Unknown Time';
                try {
                    let ds = log.timestamp.endsWith('Z') ? log.timestamp : log.timestamp + "Z";
                    const d = new Date(ds);
                    localTime = d.toLocaleString();
                } catch(e) {}

                const promptSnippet = log.prompt ? log.prompt : '<em class="text-zinc-600">None</em>';
                logsBody.innerHTML += `
                    <tr class="hover:bg-zinc-800/30 transition-colors">
                        <td class="px-6 py-3 text-zinc-500 font-mono">#${log.id}</td>
                        <td class="px-6 py-3 text-zinc-400">${localTime}</td>
                        <td class="px-6 py-3 font-mono text-zinc-300">${log.client_ip}</td>
                        <td class="px-6 py-3 font-medium text-orange-400">${log.tool_id}</td>
                        <td class="px-6 py-3 text-zinc-400 max-w-xs truncate" title="${log.prompt || ''}">${promptSnippet}</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
