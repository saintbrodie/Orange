<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange</title>
    <link rel="icon" href="/static/orange-head.svg" type="image/svg+xml">
    <script src="/static/tailwind.min.js"></script>
    <script src="/static/lucide.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <link rel="stylesheet" href="/static/styles.css?v=8">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4 font-sans selection:bg-orange-950 selection:text-orange-200">
    <div class="max-w-6xl w-full flex bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl transition-all duration-300 min-h-[600px] h-[80vh]">
        
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-950 border-r border-zinc-800 flex flex-col items-center py-8 px-4 flex-shrink-0">
            <!-- Brand -->
            <div class="flex flex-col items-center gap-3 mb-10 w-full">
                <img src="/static/orange.svg" class="w-28 h-28 rounded-xl object-contain drop-shadow-2xl" alt="Orange Mascot">
                <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-br from-orange-400 to-orange-600 text-transparent bg-clip-text text-center w-full pb-2">Orange</h1>
            </div>
            
            <!-- Tool List -->
            <div class="w-full space-y-3 flex-1 overflow-y-auto">
                <label class="text-xs font-semibold text-zinc-500 uppercase tracking-widest pl-2">Available Tools</label>
                <div id="tool-tabs" class="flex flex-col gap-2 w-full mt-2">
                    <!-- Injected dynamically -->
                </div>
            </div>
            
            <!-- VRAM Warning -->
            <div id="vram-warning" class="hidden w-full bg-orange-950/60 border border-orange-600/50 rounded-xl p-3 mb-4 mt-4 flex items-center justify-between text-orange-500 shadow-[0_0_15px_rgba(234,88,12,0.2)]">
                <i data-lucide="flame" class="w-5 h-5 shrink-0 animate-pulse"></i>
                <div class="text-[11px] leading-tight font-medium text-center px-2">Server under heavy load.<br>Generations may be slow.</div>
                <i data-lucide="flame" class="w-5 h-5 shrink-0 animate-pulse"></i>
            </div>

            <!-- Status footer -->
            <div class="w-full pt-6 border-t border-zinc-800/50 mt-auto">
                <div class="flex items-center justify-center gap-2 text-xs text-zinc-500 font-mono">
                    <div id="ai-status-dot" class="w-2 h-2 rounded-full bg-zinc-500 animate-pulse"></div>
                    <span id="ai-status-text">Checking AI...</span>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 p-8 md:p-12 lg:p-16 flex flex-col justify-center relative overflow-y-auto">
            
            <!-- Generation Form UI -->
            <div id="ui-container" class="max-w-2xl mx-auto w-full space-y-8 block animate-in fade-in zoom-in duration-300">
                <h2 class="text-2xl font-light text-zinc-200 text-center mb-8 hidden" id="active-tool-title">Select a tool</h2>
                
                <div id="dynamic-inputs" class="space-y-8">
                    <!-- Image Upload -->
                    <div id="image-upload-container" class="hidden space-y-3">
                        <div class="flex gap-4">
                            <!-- Image 1 -->
                            <div id="image1-box" class="flex-1 space-y-2">
                                <label class="text-xs font-medium text-zinc-500 uppercase tracking-widest pl-1">Image 1</label>
                                <label id="dropzone" class="flex flex-col items-center justify-center w-full h-64 border-2 border-zinc-800 border-dashed rounded-2xl cursor-pointer hover:bg-zinc-800/50 hover:border-zinc-700 transition-colors">
                                    <div class="flex flex-col items-center justify-center pt-5 pb-6 pointer-events-none">
                                        <i data-lucide="image-plus" class="w-10 h-10 mb-4 text-zinc-500"></i>
                                        <p class="mb-2 text-sm text-zinc-400 font-medium tracking-wide">Drop image here or <span class="text-orange-500">browse</span></p>
                                    </div>
                                    <input id="image-input" type="file" class="hidden" accept="image/*" />
                                </label>
                                <div id="image-preview" class="hidden relative w-full h-64 rounded-2xl overflow-hidden border border-zinc-800 group bg-zinc-950">
                                    <img id="preview-img" src="" class="w-full h-full object-contain">
                                    <button id="clear-image-btn" class="absolute top-4 right-4 bg-black/60 hover:bg-black text-white rounded-full p-2.5 backdrop-blur-md opacity-0 group-hover:opacity-100 transition-all duration-300">
                                        <i data-lucide="x" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Image 2 -->
                            <div id="image2-box" class="flex-1 space-y-2 hidden">
                                <label class="text-xs font-medium text-zinc-500 uppercase tracking-widest pl-1">Image 2</label>
                                <label id="dropzone2" class="flex flex-col items-center justify-center w-full h-64 border-2 border-zinc-800 border-dashed rounded-2xl cursor-pointer hover:bg-zinc-800/50 hover:border-zinc-700 transition-colors">
                                    <div class="flex flex-col items-center justify-center pt-5 pb-6 pointer-events-none">
                                        <i data-lucide="image-plus" class="w-10 h-10 mb-4 text-zinc-500"></i>
                                        <p class="mb-2 text-sm text-zinc-400 font-medium tracking-wide">Drop image here or <span class="text-orange-500">browse</span></p>
                                    </div>
                                    <input id="image2-input" type="file" class="hidden" accept="image/*" />
                                </label>
                                <div id="image2-preview" class="hidden relative w-full h-64 rounded-2xl overflow-hidden border border-zinc-800 group bg-zinc-950">
                                    <img id="preview-img2" src="" class="w-full h-full object-contain">
                                    <button id="clear-image2-btn" class="absolute top-4 right-4 bg-black/60 hover:bg-black text-white rounded-full p-2.5 backdrop-blur-md opacity-0 group-hover:opacity-100 transition-all duration-300">
                                        <i data-lucide="x" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Prompt Input -->
                    <div id="prompt-container" class="space-y-3">
                        <label class="text-xs font-medium text-zinc-500 uppercase tracking-widest pl-1">Prompt</label>
                        <textarea id="prompt-input" rows="5" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl p-5 text-lg focus:outline-none focus:ring-1 focus:ring-orange-600 focus:border-orange-600 transition-all resize-none placeholder:text-zinc-700" placeholder="Describe your vision..."></textarea>
                    </div>

                    <!-- Aspect Ratios -->
                    <div id="aspect-ratio-container" class="space-y-3">
                        <label class="text-xs font-medium text-zinc-500 uppercase tracking-widest pl-1">Format</label>
                        <div id="aspect-ratios" class="grid grid-cols-3 gap-3">
                            <!-- Injected -->
                        </div>
                    </div>
                </div>

                <!-- Error Banner -->
                <div id="error-banner" class="hidden bg-red-950/50 border border-red-900 text-red-200 px-4 py-3 rounded-2xl text-sm flex items-start gap-3">
                    <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i>
                    <span id="error-message">Something went wrong.</span>
                </div>

                <button id="generate-btn" class="w-full bg-gradient-to-r from-orange-600 to-orange-500 text-white font-semibold flex items-center justify-center gap-3 rounded-2xl py-5 hover:from-orange-500 hover:to-orange-400 transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-[0_0_20px_rgba(249,115,22,0.2)] text-lg">
                    <i data-lucide="wand-2" class="w-5 h-5"></i> Generate
                </button>
            </div>

            <!-- Loading State -->
            <div id="generating-layer" class="hidden flex-col items-center justify-center space-y-8 animate-in fade-in duration-300 h-full w-full max-w-lg mx-auto">
                <div id="loading-spinner" class="relative w-24 h-24 transition-opacity duration-300">
                    <div class="absolute inset-0 border-4 border-zinc-800 rounded-full"></div>
                    <div class="absolute inset-0 border-t-4 border-orange-500 rounded-full animate-spin"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <i data-lucide="flame" class="w-8 h-8 text-orange-500 animate-pulse"></i>
                    </div>
                </div>

                <div id="live-preview-container" class="hidden w-64 h-64 relative rounded-2xl overflow-hidden border border-zinc-800 shadow-xl opacity-0 transition-opacity duration-500">
                    <img id="live-preview-image" src="" alt="Live Preview" class="w-full h-full object-cover blur-[2px] transition-all duration-300">
                    <div class="absolute bottom-2 right-2 flex gap-1">
                        <div class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-bounce"></div>
                        <div class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-bounce" style="animation-delay: 0.1s"></div>
                        <div class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-bounce" style="animation-delay: 0.2s"></div>
                    </div>
                </div>
                
                <div class="text-center w-full space-y-4">
                    <h2 id="generating-title" class="text-2xl font-light text-zinc-100">Working the magic...</h2>
                    
                    <!-- Progress Bar Component -->
                    <div id="progress-container" class="hidden w-full space-y-2">
                        <div class="h-2 w-full bg-zinc-900 rounded-full overflow-hidden border border-zinc-800">
                            <div id="progress-bar-fill" class="h-full bg-gradient-to-r from-orange-600 to-orange-400 rounded-full transition-all duration-300 w-0"></div>
                        </div>
                        <div class="flex justify-between text-xs font-mono text-zinc-500 px-1">
                            <span id="progress-percentage">0%</span>
                            <span id="progress-steps">0 / 0</span>
                        </div>
                    </div>

                    <p id="queue-status" class="text-orange-400 font-mono tracking-wider bg-orange-950/30 px-4 py-2 rounded-lg border border-orange-900/50 inline-block">Connecting to server</p>
                </div>
            </div>

            <!-- Result State -->
            <div id="result-layer" class="hidden flex-col items-center justify-center space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500 h-full w-full">
                <div class="w-full rounded-2xl overflow-hidden border border-zinc-800 shadow-2xl relative group bg-zinc-950 flex items-center justify-center flex-1 max-h-[60vh]">
                    <img id="result-image" src="" alt="Generated result" class="w-full h-full object-contain">
                    <video id="result-video" src="" class="hidden w-full h-full object-contain" controls autoplay loop></video>
                    
                    <!-- Dedicated Audio UI -->
                    <div id="audio-ui" class="hidden flex flex-col items-center justify-center space-y-6 w-full h-full bg-gradient-to-br from-zinc-900/50 to-zinc-950/50 p-8">
                        <div class="w-32 h-32 rounded-full bg-orange-600/10 flex items-center justify-center border border-orange-500/20 shadow-[0_0_50px_rgba(234,88,12,0.05)]">
                            <i data-lucide="music" class="w-12 h-12 text-orange-500"></i>
                        </div>
                        <div id="waveform" class="w-full max-w-2xl bg-zinc-950/30 p-6 rounded-2xl border border-zinc-800/50"></div>
                        <div class="flex items-center gap-6">
                             <button id="audio-play-pause" class="w-16 h-16 rounded-full bg-orange-600 hover:bg-orange-500 text-white flex items-center justify-center transition-all shadow-lg shadow-orange-900/20 active:scale-95">
                                 <i data-lucide="play" class="w-8 h-8 fill-current"></i>
                             </button>
                             <div class="text-zinc-500 font-mono text-sm" id="audio-timer">00:00 / 00:00</div>
                        </div>
                        <audio id="result-audio" src="" class="hidden" controls></audio>
                    </div>
                </div>
                
                <!-- Output Text Display -->
                <div id="output-text-container" class="hidden w-full max-w-2xl bg-zinc-950/50 backdrop-blur-md border border-zinc-800 rounded-2xl p-6 relative group animate-in fade-in slide-in-from-bottom-2 duration-700">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2 text-zinc-400">
                            <i data-lucide="file-text" class="w-4 h-4 text-orange-500"></i>
                            <span class="text-xs font-bold uppercase tracking-widest">Output Text</span>
                        </div>
                        <button id="copy-text-btn" class="text-[10px] bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-2.5 py-1.5 rounded-lg transition-colors flex items-center gap-2 uppercase font-bold tracking-tighter">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy
                        </button>
                    </div>
                    <div id="output-text-display" class="text-zinc-300 whitespace-pre-wrap font-mono text-sm leading-relaxed max-h-[250px] overflow-y-auto pr-2 scrollbar-thin scrollbar-thumb-zinc-700"></div>
                </div>
                <div class="flex gap-4 w-full max-w-2xl">
                    <button id="back-btn" class="bg-zinc-900 border border-zinc-800 text-zinc-300 font-medium rounded-2xl py-4 px-8 hover:bg-zinc-800 hover:text-white transition-colors flex items-center gap-2">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i> Back
                    </button>
                    <button id="download-btn" class="flex-1 bg-zinc-100 text-zinc-950 font-semibold rounded-2xl py-4 hover:bg-white transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] flex items-center justify-center gap-3 text-lg transform hover:scale-[1.02] active:scale-[0.98]">
                        <i data-lucide="download" class="w-6 h-6"></i> <span id="download-btn-text">Download</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
            
    <!-- Futuristic Mesh Background -->
    <div class="mesh-container">
        <div class="mesh-blob mesh-1"></div>
        <div class="mesh-blob mesh-2"></div>
        <div class="mesh-blob mesh-3"></div>
        <div class="mesh-overlay"></div>
    </div>

    <script src="/static/app.js?v=8"></script>
</body>
</html>
