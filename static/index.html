<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange</title>
    <link rel="icon" href="/static/mascot.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4 font-sans selection:bg-zinc-800">
    <div class="max-w-6xl w-full flex bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl transition-all duration-300 min-h-[600px] h-[80vh]">
        
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-950 border-r border-zinc-800 flex flex-col items-center py-8 px-4 flex-shrink-0">
            <!-- Brand -->
            <div class="flex flex-col items-center gap-3 mb-10 w-full">
                <img src="/static/mascot.png" class="w-28 h-28 rounded-xl object-cover drop-shadow-2xl" alt="Orange Mascot">
                <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-br from-orange-400 to-orange-600 text-transparent bg-clip-text text-center w-full pb-2">Orange</h1>
            </div>
            
            <!-- Tool List -->
            <div class="w-full space-y-3 flex-1 overflow-y-auto">
                <label class="text-xs font-semibold text-zinc-500 uppercase tracking-widest pl-2">Available Tools</label>
                <div id="tool-tabs" class="flex flex-col gap-2 w-full mt-2">
                    <!-- Injected dynamically -->
                </div>
            </div>
            
            <!-- Status footer -->
            <div class="w-full pt-6 border-t border-zinc-800/50 mt-auto">
                <div class="flex items-center justify-center gap-2 text-xs text-zinc-500 font-mono">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    Backend Ready
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 p-8 md:p-12 lg:p-16 flex flex-col justify-center relative overflow-y-auto">
            
            <!-- Generation Form UI -->
            <div id="ui-container" class="max-w-2xl mx-auto w-full space-y-8 block animate-in fade-in zoom-in duration-300">
                <h2 class="text-2xl font-light text-zinc-200 text-center mb-8 hidden" id="active-tool-title">Select a tool</h2>
                
                <div id="dynamic-inputs" class="space-y-8">
                    <!-- Dropzone -->
                    <div id="image-upload-container" class="hidden space-y-3">
                        <label class="text-xs font-medium text-zinc-500 uppercase tracking-widest pl-1">Reference Image</label>
                        <label id="dropzone" class="flex flex-col items-center justify-center w-full h-48 border-2 border-zinc-800 border-dashed rounded-2xl cursor-pointer hover:bg-zinc-800/50 hover:border-zinc-700 transition-colors">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6 pointer-events-none">
                                <i data-lucide="image-plus" class="w-8 h-8 mb-3 text-zinc-500"></i>
                                <p class="mb-2 text-sm text-zinc-400"><span class="font-semibold text-zinc-200">Click to upload</span></p>
                            </div>
                            <input id="image-input" type="file" class="hidden" accept="image/*" />
                        </label>
                        <div id="image-preview" class="hidden relative w-full h-48 rounded-2xl overflow-hidden border border-zinc-800 group">
                            <img id="preview-img" src="" class="w-full h-full object-cover">
                            <button id="clear-image-btn" class="absolute top-3 right-3 bg-black/60 hover:bg-black text-white rounded-full p-2 backdrop-blur-md opacity-0 group-hover:opacity-100 transition-all duration-200">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Prompt Input -->
                    <div id="prompt-container" class="space-y-3">
                        <label class="text-xs font-medium text-zinc-500 uppercase tracking-widest pl-1">Prompt</label>
                        <textarea id="prompt-input" rows="5" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl p-5 text-lg focus:outline-none focus:ring-1 focus:ring-orange-600 focus:border-orange-600 transition-all resize-none placeholder:text-zinc-700" placeholder="Describe your vision..."></textarea>
                    </div>

                    <!-- Aspect Ratios -->
                    <div id="aspect-ratio-container" class="space-y-3">
                        <label class="text-xs font-medium text-zinc-500 uppercase tracking-widest pl-1">Format</label>
                        <div id="aspect-ratios" class="grid grid-cols-3 gap-3">
                            <!-- Injected -->
                        </div>
                    </div>
                </div>

                <!-- Error Banner -->
                <div id="error-banner" class="hidden bg-red-950/50 border border-red-900 text-red-200 px-4 py-3 rounded-2xl text-sm flex items-start gap-3">
                    <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i>
                    <span id="error-message">Something went wrong.</span>
                </div>

                <button id="generate-btn" class="w-full bg-gradient-to-r from-orange-600 to-orange-500 text-white font-semibold flex items-center justify-center gap-3 rounded-2xl py-5 hover:from-orange-500 hover:to-orange-400 transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-[0_0_20px_rgba(249,115,22,0.2)] text-lg">
                    <i data-lucide="wand-2" class="w-5 h-5"></i> Generate
                </button>
            </div>

            <!-- Loading State -->
            <div id="generating-layer" class="hidden flex-col items-center justify-center space-y-8 animate-in fade-in duration-300 h-full w-full max-w-lg mx-auto">
                <div class="relative w-24 h-24">
                    <div class="absolute inset-0 border-4 border-zinc-800 rounded-full"></div>
                    <div class="absolute inset-0 border-t-4 border-orange-500 rounded-full animate-spin"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <i data-lucide="flame" class="w-8 h-8 text-orange-500 animate-pulse"></i>
                    </div>
                </div>
                
                <div class="text-center w-full space-y-4">
                    <h2 id="generating-title" class="text-2xl font-light text-zinc-100">Working the magic...</h2>
                    
                    <!-- Progress Bar Component -->
                    <div id="progress-container" class="hidden w-full space-y-2">
                        <div class="h-2 w-full bg-zinc-900 rounded-full overflow-hidden border border-zinc-800">
                            <div id="progress-bar-fill" class="h-full bg-gradient-to-r from-orange-600 to-orange-400 rounded-full transition-all duration-300 w-0"></div>
                        </div>
                        <div class="flex justify-between text-xs font-mono text-zinc-500 px-1">
                            <span id="progress-percentage">0%</span>
                            <span id="progress-steps">0 / 0</span>
                        </div>
                    </div>

                    <p id="queue-status" class="text-orange-400 font-mono tracking-wider bg-orange-950/30 px-4 py-2 rounded-lg border border-orange-900/50 inline-block">Connecting to server</p>
                </div>
            </div>

            <!-- Result State -->
            <div id="result-layer" class="hidden flex-col items-center justify-center space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500 h-full w-full">
                <div class="w-full rounded-2xl overflow-hidden border border-zinc-800 shadow-2xl relative group bg-zinc-950 flex items-center justify-center flex-1 max-h-[60vh]">
                    <img id="result-image" src="" alt="Generated result" class="w-full h-full object-contain">
                </div>
                <div class="flex gap-4 w-full max-w-2xl">
                    <button id="back-btn" class="bg-zinc-900 border border-zinc-800 text-zinc-300 font-medium rounded-2xl py-4 px-8 hover:bg-zinc-800 hover:text-white transition-colors flex items-center gap-2">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i> Back
                    </button>
                    <button id="download-btn" class="flex-1 bg-zinc-100 text-zinc-950 font-semibold rounded-2xl py-4 hover:bg-white transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] flex items-center justify-center gap-3 text-lg transform hover:scale-[1.02] active:scale-[0.98]">
                        <i data-lucide="download" class="w-6 h-6"></i> Download Image
                    </button>
                </div>
            </div>
            
        </div>
    </div>
    <script src="/static/app.js?v=2"></script>
</body>
</html>
